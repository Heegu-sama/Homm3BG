name: Build release version

on:
  workflow_dispatch:

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - id: set-matrix
        run: |
          # TODO: Add Hebrew to the list after fixing expansion enviroment in metadata.tex
          # { "language_name": "Ivrit", "language": "he", "display": "🇮🇱 עברית"}
          cat << 'EOF' > matrix.json
          {
            "include": [
              { "language_name": "English", "language": "en", "display": "🇺🇸 English"},
              { "language_name": "Polski", "language": "pl", "display": "🇵🇱 Polski"},
              { "language_name": "Espanol", "language": "es", "display": "🇪🇸 Español"},
              { "language_name": "Francais", "language": "fr", "display": "🇫🇷 Français"},
              { "language_name": "Russkiy", "language": "ru", "display": "🇷🇺 Русский"},
              { "language_name": "Ukrainska", "language": "ua", "display": "🇺🇦 Українська"},
              { "language_name": "Deutsch", "language": "de", "display": "🇩🇪 Deutsch"},
              { "language_name": "Cestina", "language": "cs", "display": "🇨🇿 Čeština"}
            ]
          }
          EOF
          echo "matrix=$(jq -c . matrix.json)" >> $GITHUB_OUTPUT

      - id: set-version
        run: echo "version=$(cat .version | tr . _)" >> $GITHUB_OUTPUT

  digital_build:
    needs: matrix-setup
    name: "Digital / ${{ matrix.display }}"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}
    uses: ./.github/workflows/pdf-build.yaml
    with:
      language: ${{ matrix.language }}
      build_type: digital
      file_name: "Heroes3_${{ matrix.language_name }}_Rules_Rewrite_${{ needs.matrix-setup.outputs.version }}"

  printable_build:
    needs: matrix-setup
    name: "Printable / ${{ matrix.display }}"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}
    uses: ./.github/workflows/pdf-build.yaml
    with:
      language: ${{ matrix.language }}
      build_type: printable
      file_name: "Heroes3_${{ matrix.language_name }}_Rules_Rewrite_${{ needs.matrix-setup.outputs.version }}_Printable"
      convert_to_cmyk: true

  economy_build:
    needs: matrix-setup
    name: "Printable Economy / ${{ matrix.display }}"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}
    uses: ./.github/workflows/pdf-build.yaml
    with:
      language: ${{ matrix.language }}
      file_name: "Heroes3_${{ matrix.language_name }}_Rules_Rewrite_${{ needs.matrix-setup.outputs.version }}_Economy_Printable"
      build_type: economy

  upload_single_package:
    runs-on: ubuntu-latest
    needs: [matrix-setup, digital_build, printable_build, economy_build]
    steps:
      - name: Create dir
        run: mkdir all_booklets

      - name: Download compiled books
        uses: actions/download-artifact@v8
        with:
          pattern: "Heroes3_*"
          path: all_booklets
          merge-multiple: true

      - name: Upload single package
        uses: actions/upload-artifact@v7
        with:
          name: "All_booklets_${{ needs.matrix-setup.outputs.version }}"
          path: all_booklets
          retention-days: 7
